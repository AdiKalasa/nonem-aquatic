<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .container{
            margin-top: 50vh;
            display: flex;
            border: 2px solid;
            animation: codes 1s infinite;
        }
        .container img{
            width: 100px;
        }
        @keyframes codes {
            0%{transform: rotateZ(0deg);}
            50%{transform: rotateZ(3000deg);}
            100%{transform: rotateZ(0deg);}
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="gambar/logo etc/wa.png" alt="">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum veritatis rem id, distinctio rerum cumque? Eum blanditiis ipsum ad ullam, nemo quae numquam iste aliquam temporibus, voluptates tempora nulla consectetur.</p>
    </div>
</body>
</html>
